<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense & Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>Expense &amp; Budget Visualizer</h1>
  </header>

  <main>
    <section id="form-section">
      <h2>Add Transaction</h2>
      <form id="transaction-form" novalidate>
        <div class="form-group">
          <label for="name">Item Name</label>
          <input type="text" id="name" name="name" placeholder="e.g. Groceries" />
        </div>
        <div class="form-group">
          <label for="amount">Amount</label>
          <input type="number" id="amount" name="amount" placeholder="e.g. 12.50" min="0.01" step="0.01" />
        </div>
        <div class="form-group">
          <label for="category">Category</label>
          <select id="category" name="category">
            <option value="">-- Select --</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Fun">Fun</option>
          </select>
        </div>
        <p id="form-error" class="form-error" aria-live="polite" hidden></p>
        <button type="submit">Add</button>
      </form>
    </section>

    <section id="summary">
      <div id="balance">
        <span class="balance-label">Total Balance</span>
        <span class="balance-amount">$0.00</span>
      </div>
      <div id="chart-container">
        <canvas id="chart"></canvas>
        <p id="chart-placeholder">No transactions yet.</p>
      </div>
    </section>

    <section id="list-section">
      <h2>Transactions</h2>
      <div id="transaction-list">
        <p class="empty-state">No transactions yet.</p>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
